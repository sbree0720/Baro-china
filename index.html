<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>바로차이나 — 미리보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#0064FF;--dark:#191F28;--g5:#E8ECF0;--g6:#F2F4F6}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:#23272f}

.toolbar{
  height:52px;background:var(--dark);
  display:flex;align-items:center;gap:10px;padding:0 16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);position:relative;z-index:10;
}
.logo{font-size:1rem;font-weight:900;color:var(--blue)}
.logo b{color:#fff}
.logo small{font-size:.7rem;color:rgba(255,255,255,.35);font-weight:400;margin-left:6px}
.vp-group{display:flex;gap:4px;margin-left:auto}
.vp{
  background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.65);border-radius:8px;
  padding:6px 14px;font-size:0.8rem;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.vp:hover{background:rgba(255,255,255,0.15);color:#fff}
.vp.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 10px rgba(0,100,255,.4)}

.stage{
  height:calc(100vh - 52px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  transition:background .25s;
}
.stage.bg-dark{background:#111}
.stage.bg-mid{background:#23272f}

.wrapper{
  position:relative;overflow:hidden;
  transition:all .3s ease;
  background:#fff;
}
.wrapper.desktop{
  width:100%;height:100%;border-radius:10px;
  box-shadow:0 4px 40px rgba(0,0,0,.5);
}
.wrapper.tablet{
  width:768px;height:100%;max-height:1024px;border-radius:10px;
  box-shadow:0 4px 40px rgba(0,0,0,.5);
}
.wrapper.mobile{
  width:390px;height:100%;max-height:844px;
  border-radius:44px;
  outline:10px solid #1a1a1a;
  box-shadow:0 0 0 11px #333, 0 16px 56px rgba(0,0,0,.7);
}
.wrapper.mobile::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:115px;height:28px;background:#1a1a1a;
  border-radius:0 0 16px 16px;z-index:5;pointer-events:none;
}
iframe{
  width:100%;height:100%;border:none;display:block;
}
.wrapper.mobile iframe{
  border-radius:36px;
}

.loader{
  position:absolute;inset:0;background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  z-index:20;transition:opacity .4s;border-radius:inherit;
}
.loader.done{opacity:0;pointer-events:none}
.spin{
  width:34px;height:34px;
  border:3px solid #E8ECF0;border-top-color:var(--blue);
  border-radius:50%;animation:rot .7s linear infinite;
}
@keyframes rot{to{transform:rotate(360deg)}}
.spin-txt{font-size:.8rem;color:#8B95A1;font-weight:500}
</style>
</head>
<body>

<div class="toolbar">
  <div class="logo">바로<b>차이나</b><small>토스 스타일 v2 미리보기</small></div>
  <div class="vp-group">
    <button class="vp on"  onclick="setVP('desktop',this)">🖥 데스크탑</button>
    <button class="vp"     onclick="setVP('tablet',this)">📱 태블릿</button>
    <button class="vp"     onclick="setVP('mobile',this)">📲 모바일</button>
  </div>
</div>

<div class="stage bg-mid" id="stage">
  <div class="wrapper desktop" id="wrapper">
    <div class="loader" id="loader">
      <div class="spin"></div>
      <p class="spin-txt">페이지 불러오는 중...</p>
    </div>
    <iframe
      id="frame"
      srcdoc="<!DOCTYPE html>
<html lang=&quot;ko&quot;>
<head>
<meta charset=&quot;UTF-8&quot;/>
<meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;/>
<title>바로차이나 — 중국 여행 앱 &amp; 준비 가이드</title>
<meta name=&quot;description&quot; content=&quot;중국 여행 필수앱 TOP10, 출국 전 체크리스트, 기초회화까지. 중국 여행 준비, 여기 하나면 끝.&quot;/>
<link rel=&quot;preconnect&quot; href=&quot;https://fonts.googleapis.com&quot;/>
<link href=&quot;https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap&quot; rel=&quot;stylesheet&quot;/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0064FF;
  --blue-dark:#0052D4;
  --blue-light:#EEF4FF;
  --blue-mid:#3D7EFF;
  --dark:#191F28;
  --g1:#333D4B;
  --g2:#4E5968;
  --g3:#8B95A1;
  --g4:#B0B8C1;
  --g5:#E8ECF0;
  --g6:#F2F4F6;
  --g7:#F9FAFB;
  --white:#FFFFFF;
  --red:#E03131;
  --green:#12B886;
  --r:20px;
  --r-sm:14px;
  --shadow:0 2px 16px rgba(0,0,0,0.07);
  --shadow-hover:0 8px 36px rgba(0,0,0,0.13);
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--white);color:var(--dark);line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--g5);
  height:60px;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{font-size:1.2rem;font-weight:900;color:var(--blue);text-decoration:none;letter-spacing:-0.5px}
.nav-logo b{color:var(--dark)}
.nav-links{display:flex;gap:4px}
.nav-links a{font-size:0.875rem;font-weight:500;color:var(--g2);text-decoration:none;padding:7px 12px;border-radius:8px;transition:background .15s,color .15s}
.nav-links a:hover{background:var(--g6);color:var(--dark)}
.nav-btn{background:var(--blue);color:#fff;border:none;border-radius:100px;padding:9px 18px;font-size:0.875rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.nav-btn:hover{background:var(--blue-dark)}
.nav-mob{display:none}

/* ── HERO ── */
.hero{
  padding:80px 24px 72px;
  background:linear-gradient(160deg,#f0f5ff 0%,#fff 60%);
  text-align:center;
}
.hero-inner{max-width:640px;margin:0 auto}
.hero-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--blue-light);color:var(--blue);
  border-radius:100px;padding:6px 14px;
  font-size:0.8rem;font-weight:700;margin-bottom:28px;
}
.hero h1{
  font-size:clamp(2rem,7vw,3rem);font-weight:900;
  line-height:1.2;letter-spacing:-1.5px;color:var(--dark);margin-bottom:20px;
}
.hero h1 em{color:var(--blue);font-style:normal}
.hero-sub{
  font-size:clamp(1rem,3vw,1.125rem);
  color:var(--g2);margin-bottom:36px;line-height:1.8;
}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{
  background:var(--blue);color:#fff;border:none;border-radius:14px;
  padding:17px 32px;font-size:1rem;font-weight:700;cursor:pointer;
  font-family:inherit;display:inline-flex;align-items:center;gap:8px;
  box-shadow:0 4px 24px rgba(0,100,255,.28);
  transition:background .15s,transform .14s,box-shadow .15s;
}
.btn-primary:hover{background:var(--blue-dark);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,100,255,.36)}
.btn-outline{
  background:#fff;color:var(--dark);border:1.5px solid var(--g5);border-radius:14px;
  padding:16px 28px;font-size:1rem;font-weight:600;cursor:pointer;
  font-family:inherit;display:inline-flex;align-items:center;gap:8px;
  transition:border-color .15s,box-shadow .15s;
}
.btn-outline:hover{border-color:var(--blue);box-shadow:0 2px 12px rgba(0,100,255,.1)}
.hero-note{margin-top:20px;font-size:0.8rem;color:var(--g4);display:flex;align-items:center;gap:6px;justify-content:center}
.hero-note::before{content:&quot;✓&quot;;color:var(--blue);font-weight:700}

/* ── SECTION COMMON ── */
.section{padding:72px 24px}
.section-alt{background:var(--g7)}
.sec-inner{max-width:780px;margin:0 auto}
.sec-label{font-size:0.8rem;font-weight:700;color:var(--blue);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.sec-title{font-size:clamp(1.625rem,5vw,2.25rem);font-weight:900;letter-spacing:-1px;line-height:1.25;margin-bottom:10px}
.sec-desc{font-size:1rem;color:var(--g2);margin-bottom:36px;line-height:1.75}

/* ── APP CARDS GRID ── */
.apps-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:14px;
}
.app-card{
  background:var(--white);border-radius:var(--r);
  border:1.5px solid var(--g5);padding:20px;
  display:flex;align-items:flex-start;gap:16px;
  box-shadow:var(--shadow);
  transition:box-shadow .2s,border-color .2s,transform .18s;
  position:relative;overflow:hidden;
}
.app-card:hover{box-shadow:var(--shadow-hover);border-color:var(--blue);transform:translateY(-2px)}
.app-rank{
  position:absolute;top:14px;right:16px;
  font-size:0.7rem;font-weight:800;color:var(--g4);
}
.app-rank.top3{color:var(--blue)}
.app-icon-wrap{
  width:56px;height:56px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.75rem;flex-shrink:0;
}
.app-body{flex:1;min-width:0}
.app-name{font-size:1rem;font-weight:800;color:var(--dark);margin-bottom:3px}
.app-tag{
  display:inline-block;font-size:0.7rem;font-weight:700;
  padding:2px 8px;border-radius:100px;margin-bottom:8px;
}
.tag-pay{background:#FFF0F0;color:var(--red)}
.tag-map{background:#FFF3E0;color:#E67700}
.tag-trans{background:#F0FFF4;color:#2F9E44}
.tag-comm{background:var(--blue-light);color:var(--blue)}
.tag-taxi{background:#F3F0FF;color:#6741D9}
.tag-food{background:#FFF0F9;color:#C2255C}
.tag-travel{background:#E6F9F1;color:#0CA678}
.app-desc{font-size:0.875rem;color:var(--g2);line-height:1.55;margin-bottom:14px}
.app-why{
  background:var(--g7);border-radius:10px;
  padding:10px 12px;font-size:0.8125rem;
  color:var(--g1);line-height:1.5;margin-bottom:14px;
  border-left:3px solid var(--blue);
}
.app-why strong{color:var(--blue);font-size:0.75rem;display:block;margin-bottom:2px}
.app-dl-btn{
  background:var(--dark);color:#fff;border:none;border-radius:10px;
  padding:10px 0;font-size:0.875rem;font-weight:700;cursor:pointer;
  font-family:inherit;width:100%;transition:background .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.app-dl-btn:hover{background:var(--g1)}

/* ── DOWNLOAD MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:500;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal-sheet{
  background:#fff;width:100%;max-width:480px;
  border-radius:24px 24px 0 0;padding:28px 24px 40px;
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--g5);border-radius:100px;margin:0 auto 20px}
.modal-app-info{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.modal-app-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.75rem}
.modal-app-name{font-size:1.125rem;font-weight:800}
.modal-app-sub{font-size:0.875rem;color:var(--g3);margin-top:3px}
.modal-btns{display:flex;flex-direction:column;gap:10px}
.modal-dl-ios,.modal-dl-android{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:16px;border-radius:14px;font-size:1rem;font-weight:700;
  cursor:pointer;font-family:inherit;border:none;text-decoration:none;
  transition:background .15s;
}
.modal-dl-ios{background:var(--dark);color:#fff}
.modal-dl-ios:hover{background:var(--g1)}
.modal-dl-android{background:var(--g6);color:var(--dark)}
.modal-dl-android:hover{background:var(--g5)}
.modal-close{
  margin-top:14px;width:100%;padding:14px;background:none;border:none;
  font-size:0.9375rem;color:var(--g3);cursor:pointer;font-family:inherit;font-weight:500;
}

/* ── WARNING SECTION ── */
.warn-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.warn-card{
  background:var(--white);border-radius:var(--r);
  border:1.5px solid var(--g5);padding:24px 20px;
  box-shadow:var(--shadow);
}
.warn-card.accent{border-color:#FFCDD2;background:#FFF9F9}
.warn-icon{font-size:2rem;margin-bottom:12px;line-height:1}
.warn-card h3{font-size:1rem;font-weight:800;margin-bottom:8px;line-height:1.35}
.warn-card p{font-size:0.875rem;color:var(--g2);line-height:1.6}

/* ── CHECKLIST ── */
.progress-box{
  background:var(--blue-light);border-radius:var(--r);
  padding:20px 24px;margin-bottom:24px;
}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-top span{font-size:0.9375rem;font-weight:700;color:var(--dark)}
.progress-top strong{font-size:1.375rem;font-weight:900;color:var(--blue)}
.progress-track{height:10px;background:rgba(0,100,255,.15);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:100px;transition:width .4s ease;width:0%}
.progress-caption{margin-top:8px;font-size:0.8rem;color:var(--blue);font-weight:600}

.check-groups{display:flex;flex-direction:column;gap:24px}
.check-group-label{
  font-size:0.8125rem;font-weight:800;color:var(--g3);
  letter-spacing:.5px;text-transform:uppercase;
  padding-bottom:10px;border-bottom:1.5px solid var(--g5);
  margin-bottom:4px;
}
.check-items{display:flex;flex-direction:column;gap:8px}
.check-item{
  background:var(--white);border-radius:var(--r-sm);
  border:1.5px solid var(--g5);padding:16px 18px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:border-color .18s,background .18s,box-shadow .18s;
  user-select:none;
}
.check-item:hover{border-color:var(--blue);box-shadow:0 2px 12px rgba(0,100,255,.08)}
.check-item.checked{background:var(--blue-light);border-color:var(--blue)}
.check-circle{
  width:26px;height:26px;border-radius:50%;
  border:2px solid var(--g4);background:#fff;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.check-item.checked .check-circle{background:var(--blue);border-color:var(--blue)}
.check-circle svg{display:none}
.check-item.checked .check-circle svg{display:block}
.check-text{flex:1}
.check-text strong{font-size:0.9375rem;font-weight:700;color:var(--dark);display:block}
.check-text span{font-size:0.8125rem;color:var(--g3);margin-top:1px;display:block}
.check-item.checked .check-text strong{color:var(--blue)}
.check-badge{
  font-size:0.7rem;font-weight:700;padding:3px 9px;
  border-radius:100px;flex-shrink:0;
}
.cb-must{background:#FFECEC;color:var(--red)}
.cb-app{background:var(--blue-light);color:var(--blue)}
.cb-thing{background:#F0FFF4;color:var(--green)}

/* ── PHRASES ── */
.phrase-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.phrase-tab{
  background:var(--g6);color:var(--g2);border:none;border-radius:100px;
  padding:9px 18px;font-size:0.875rem;font-weight:700;cursor:pointer;
  font-family:inherit;transition:background .15s,color .15s;
}
.phrase-tab.active{background:var(--dark);color:#fff}
.phrase-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:12px;
}
.phrase-card{
  background:var(--white);border-radius:var(--r-sm);
  border:1.5px solid var(--g5);padding:18px 20px;
  box-shadow:var(--shadow);
  display:flex;align-items:center;gap:14px;
}
.phrase-body{flex:1}
.phrase-kr{font-size:0.8125rem;color:var(--g3);margin-bottom:4px}
.phrase-cn{font-size:1.125rem;font-weight:700;color:var(--dark);margin-bottom:3px}
.phrase-py{font-size:0.8125rem;color:var(--g4);font-style:italic}
.phrase-play{
  width:40px;height:40px;border-radius:50%;
  background:var(--g6);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;transition:background .15s,transform .12s;
}
.phrase-play:hover{background:var(--blue);transform:scale(1.1)}
.phrase-panel{display:none}
.phrase-panel.active{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}

/* ── FOOTER ── */
footer{background:var(--dark);padding:48px 24px 36px}
.footer-inner{max-width:780px;margin:0 auto}
.footer-logo{font-size:1.25rem;font-weight:900;color:var(--blue);margin-bottom:6px}
.footer-tagline{font-size:0.875rem;color:var(--g3);margin-bottom:28px}
.footer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:32px}
.footer-col h4{font-size:0.875rem;font-weight:800;color:var(--g4);margin-bottom:12px;letter-spacing:.5px}
.footer-col a{display:block;font-size:0.875rem;color:var(--g3);text-decoration:none;margin-bottom:8px;transition:color .12s}
.footer-col a:hover{color:#fff}
.footer-bottom{
  padding-top:24px;border-top:1px solid #2A3340;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
}
.footer-bottom p{font-size:0.775rem;color:#4E5968}
.footer-update{font-size:0.775rem;color:#4E5968}

/* ── SCROLL REVEAL ── */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease}
.reveal.show{opacity:1;transform:none}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .nav-links{display:none}
  .nav-mob{display:block;font-size:1.25rem;background:none;border:none;cursor:pointer;color:var(--dark);padding:4px}
  .apps-grid{grid-template-columns:1fr}
  .warn-cards{grid-template-columns:1fr}
  .footer-grid{grid-template-columns:1fr 1fr}
  .hero-btns{flex-direction:column;align-items:stretch}
  .btn-primary,.btn-outline{justify-content:center}
}
@media(max-width:400px){
  .footer-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href=&quot;#&quot; class=&quot;nav-logo&quot;>바로<b>차이나</b></a>
  <div class=&quot;nav-links&quot;>
    <a href=&quot;#apps&quot;>필수앱</a>
    <a href=&quot;#warning&quot;>준비 안내</a>
    <a href=&quot;#checklist&quot;>체크리스트</a>
    <a href=&quot;#phrases&quot;>기초회화</a>
  </div>
  <button class=&quot;nav-btn&quot; onclick=&quot;scrollToId('checklist')&quot;>출국 전 체크하기</button>
  <button class=&quot;nav-mob&quot; aria-label=&quot;메뉴&quot;>☰</button>
</nav>

<!-- HERO -->
<section class=&quot;hero&quot;>
  <div class=&quot;hero-inner reveal&quot;>
    <div class=&quot;hero-chip&quot;>🇨🇳 중국 여행 준비 가이드</div>
    <h1>중국 여행,<br>앱 준비 안 하면<br><em>진짜 불편합니다.</em></h1>
    <p class=&quot;hero-sub&quot;>결제·지도·택시·번역까지<br>출국 전에 꼭 설치해야 하는 앱만 정리했습니다.</p>

  </div>
</div>

<script>
/* ── APP STORE LINKS ── */
const appLinks = {
  alipay:     { ios:'https://apps.apple.com/kr/app/alipay/id333206289', android:'https://play.google.com/store/apps/details?id=com.eg.android.AlipayGphone' },
  wechat:     { ios:'https://apps.apple.com/kr/app/wechat/id414478124', android:'https://play.google.com/store/apps/details?id=com.tencent.mm' },
  amap:       { ios:'https://apps.apple.com/kr/app/amap/id461703208',   android:'https://play.google.com/store/apps/details?id=com.autonavi.minimap' },
  baidu:      { ios:'https://apps.apple.com/kr/app/baidu-maps/id452186370', android:'https://play.google.com/store/apps/details?id=com.baidu.BaiduMap' },
  didi:       { ios:'https://apps.apple.com/kr/app/didi/id1337925578',  android:'https://play.google.com/store/apps/details?id=com.sdu.didi.gsui' },
  trip:       { ios:'https://apps.apple.com/kr/app/trip-com/id681752345', android:'https://play.google.com/store/apps/details?id=ctrip.english' },
  papago:     { ios:'https://apps.apple.com/kr/app/papago/id1147874819', android:'https://play.google.com/store/apps/details?id=com.naver.labs.translator' },
  gtranslate: { ios:'https://apps.apple.com/kr/app/google-translate/id414706506', android:'https://play.google.com/store/apps/details?id=com.google.android.apps.translate' },
  meituan:    { ios:'https://apps.apple.com/cn/app/id423084029',        android:'https://play.google.com/store/apps/details?id=com.sankuai.meituan' },
  dianping:   { ios:'https://apps.apple.com/cn/app/id351091731',        android:'https://play.google.com/store/apps/details?id=com.dianping.v1' },
};

function openModal(name, icon, key, bg) {
  document.getElementById('mName').textContent = name;
  document.getElementById('mIcon').textContent = icon;
  document.getElementById('mIcon').style.background = bg;
  const links = appLinks[key] || { ios:'#', android:'#' };
  document.getElementById('mIosBtn').href = links.ios;
  document.getElementById('mAndBtn').href = links.android;
  document.getElementById('dlModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('dlModal').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('dlModal')) closeModal();
}

/* ── CHECKLIST ── */
const TOTAL_CHECKS = document.querySelectorAll('.check-item').length;
function toggleCheck(el) {
  el.classList.toggle('checked');
  updateProgress();
}
function updateProgress() {
  const done = document.querySelectorAll('.check-item.checked').length;
  const pct = Math.round(done / TOTAL_CHECKS * 100);
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('pfill').style.width = pct + '%';
  const cap = document.getElementById('pcap');
  if (pct === 0) cap.textContent = '아직 체크한 항목이 없습니다. 시작해보세요!';
  else if (pct < 50) cap.textContent = done + '개 완료 · 잘 하고 있어요! 계속 준비하세요.';
  else if (pct < 100) cap.textContent = done + '개 완료 · 거의 다 왔습니다!';
  else cap.textContent = '🎉 모든 준비 완료! 즐거운 중국 여행 되세요.';
}

/* ── PHRASE TABS ── */
function switchTab(btn, panelId) {
  document.querySelectorAll('.phrase-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.phrase-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(panelId).classList.add('active');
}

/* ── SCROLL REVEAL ── */
const ro = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('show'); ro.unobserve(e.target); } });
}, { threshold: 0.07 });
document.querySelectorAll('.reveal').forEach(el => ro.observe(el));

/* ── HELPER ── */
function scrollToId(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
